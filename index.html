<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시재현 — 한화생명 LIFEPLUS미디어팀</title>
  <style>
    :root {
      --accent: #E31837;
      --doosan: #00205B;
      --border: rgba(0,0,0,0.08);
      --sub: #6B7280;
      --text: #111827;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: #030C1A;
    }

    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.2);
    }

    /* ── Header ── */
    .card-header {
      padding: 1.75rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: #FEF2F2;
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      margin-bottom: 0.85rem;
    }

    .tag-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    .name {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      color: var(--text);
    }

    .dept {
      margin-top: 0.35rem;
      font-size: 0.84rem;
      color: var(--sub);
    }

    /* ── Info ── */
    .card-info {
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.48rem;
    }

    .row {
      display: flex;
      gap: 1rem;
      font-size: 0.82rem;
    }

    .row-key {
      color: var(--sub);
      width: 3.5rem;
      flex-shrink: 0;
      font-size: 0.74rem;
    }

    .row-val { color: var(--text); }

    /* ── Matchup ── */
    .matchup {
      padding: 1.6rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(160deg, #FEF2F2 0%, #EFF4FF 100%);
    }

    .matchup-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--sub);
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 1.3rem;
    }

    .teams {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
    }

    .team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
    }

    .emblem { width: 86px; height: 86px; }

    .team-label {
      font-size: 0.74rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }
    .team-label.lg   { color: var(--accent); }
    .team-label.doosan { color: var(--doosan); }

    .team-sub {
      font-size: 0.62rem;
      color: var(--sub);
      margin-top: -0.2rem;
    }

    .vs-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }

    .vs-text {
      font-size: 1rem;
      font-weight: 900;
      color: #C8D3E0;
      letter-spacing: 0.05em;
    }

    .series-text {
      font-size: 0.58rem;
      color: var(--sub);
      text-align: center;
      line-height: 1.5;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 1.5rem 2rem 2rem;
    }

    .footer-label {
      font-size: 0.66rem;
      color: var(--sub);
      letter-spacing: 0.08em;
      margin-bottom: 0.7rem;
    }

    .footer-text {
      font-size: 0.9rem;
      line-height: 1.85;
      color: #374151;
    }

    .footer-text em {
      font-style: normal;
      color: var(--accent);
      font-weight: 700;
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 1.2rem;
      padding: 0.85rem;
      background: var(--accent);
      color: white;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.04em;
      transition: background 0.12s, transform 0.1s;
    }

    .btn:hover { background: #C81230; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    @media (prefers-reduced-motion: reduce) {
      .tag-dot { animation: none; }
      .btn:hover { transform: none; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="card">

  <div class="card-header">
    <div class="tag"><span class="tag-dot"></span>LG 트윈스 팬</div>
    <div class="name">시재현</div>
    <div class="dept">한화생명 LIFEPLUS미디어팀</div>
  </div>

  <div class="card-info">
    <div class="row">
      <span class="row-key">이메일</span>
      <span class="row-val">sjh0927@hanwha.com</span>
    </div>
    <div class="row">
      <span class="row-key">소속</span>
      <span class="row-val">한화생명 LIFEPLUS미디어팀</span>
    </div>
  </div>

  <div class="matchup">
    <div class="matchup-label">2026 KBO 클래식 시리즈 · 개막일</div>
    <div class="teams">

      <!-- LG Twins Emblem -->
      <div class="team-block">
        <svg class="emblem" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="LG 트윈스">
          <defs>
            <path id="lg-arc" d="M 12 50 A 38 38 0 0 1 88 50"/>
          </defs>
          <!-- Outer red ring -->
          <circle cx="50" cy="50" r="49" fill="#CC0000"/>
          <!-- White ring -->
          <circle cx="50" cy="50" r="41" fill="white"/>
          <!-- Inner red -->
          <circle cx="50" cy="50" r="34" fill="#E31837"/>
          <!-- Star top -->
          <polygon points="50,18 51.8,23 57,23 52.8,26 54.5,31 50,28 45.5,31 47.2,26 43,23 48.2,23" fill="white" opacity="0.9"/>
          <!-- LG bold -->
          <text x="50" y="57"
                text-anchor="middle"
                dominant-baseline="middle"
                font-family="Arial Black, Impact, sans-serif"
                font-size="25"
                font-weight="900"
                fill="white">LG</text>
          <!-- TWINS arc text in white ring (bottom) -->
          <text font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="800"
                fill="#CC0000" letter-spacing="3.5">
            <textPath href="#lg-arc" startOffset="50%" text-anchor="middle">TWINS</textPath>
          </text>
        </svg>
        <div class="team-label lg">LG 트윈스</div>
        <div class="team-sub">나</div>
      </div>

      <div class="vs-block">
        <div class="vs-text">VS</div>
        <div class="series-text">클래식<br>시리즈</div>
      </div>

      <!-- Doosan Bears Emblem -->
      <div class="team-block">
        <svg class="emblem" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="두산 베어즈">
          <defs>
            <path id="db-arc" d="M 12 50 A 38 38 0 0 1 88 50"/>
          </defs>
          <!-- Outer navy ring -->
          <circle cx="50" cy="50" r="49" fill="#001449"/>
          <!-- White ring -->
          <circle cx="50" cy="50" r="41" fill="white"/>
          <!-- Inner navy -->
          <circle cx="50" cy="50" r="34" fill="#00205B"/>
          <!-- Bear left ear -->
          <ellipse cx="35" cy="26" rx="9" ry="8" fill="white"/>
          <ellipse cx="35" cy="26" rx="5.5" ry="5" fill="#00205B"/>
          <!-- Bear right ear -->
          <ellipse cx="65" cy="26" rx="9" ry="8" fill="white"/>
          <ellipse cx="65" cy="26" rx="5.5" ry="5" fill="#00205B"/>
          <!-- Bear head -->
          <ellipse cx="50" cy="49" rx="21" ry="19" fill="white"/>
          <!-- Eyes -->
          <circle cx="43" cy="44" r="3" fill="#00205B"/>
          <circle cx="57" cy="44" r="3" fill="#00205B"/>
          <circle cx="44.2" cy="43" r="1.1" fill="white"/>
          <circle cx="58.2" cy="43" r="1.1" fill="white"/>
          <!-- Snout -->
          <ellipse cx="50" cy="56" rx="10" ry="7" fill="#D4B483"/>
          <!-- Nose -->
          <ellipse cx="50" cy="50" rx="5.5" ry="3.8" fill="#00205B"/>
          <!-- Mouth -->
          <path d="M 44 57.5 Q 50 63 56 57.5" stroke="#00205B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <!-- BEARS arc text in white ring (bottom) -->
          <text font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="800"
                fill="#00205B" letter-spacing="2.5">
            <textPath href="#db-arc" startOffset="50%" text-anchor="middle">BEARS</textPath>
          </text>
        </svg>
        <div class="team-label doosan">두산 베어즈</div>
        <div class="team-sub">강사님</div>
      </div>

    </div>
  </div>

  <div class="card-footer">
    <div class="footer-label">강사님께 드리는 정중한 부탁</div>
    <div class="footer-text">
      오늘부터 클래식 시리즈가 시작됩니다.<br>
      강사님이 두산 팬이신 것 같아 조심스럽지만—<br>
      <em>져주시면 정말 감사하겠습니다.</em><br>
      수업도 열심히 듣겠습니다. 진심으로.
    </div>
    <button class="btn" onclick="alert('감사합니다, 강사님! LG 승리!')">
      져주세요 (간곡히)
    </button>
  </div>

</div>

<script>
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');

  function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const W = canvas.width, H = canvas.height;

    // Night sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#020810');
    sky.addColorStop(0.55, '#0A1E3C');
    sky.addColorStop(1, '#06121F');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (let i = 0; i < 70; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H * 0.18;
      const r = Math.random() * 1.3;
      ctx.fillStyle = `rgba(255,255,255,${0.25 + Math.random() * 0.55})`;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Stadium upper deck silhouette
    ctx.fillStyle = '#060E1C';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.55);
    ctx.lineTo(0, H * 0.24);
    ctx.quadraticCurveTo(W * 0.1, H * 0.17, W * 0.28, H * 0.13);
    ctx.quadraticCurveTo(W * 0.5, H * 0.09, W * 0.72, H * 0.13);
    ctx.quadraticCurveTo(W * 0.9, H * 0.17, W, H * 0.24);
    ctx.lineTo(W, H * 0.55);
    ctx.closePath();
    ctx.fill();

    // Stands seat rows — faint horizontal bands
    for (let i = 0; i < 9; i++) {
      const y = H * 0.20 + i * H * 0.037;
      ctx.fillStyle = `rgba(255,255,255,${0.012 + i * 0.006})`;
      ctx.fillRect(0, y, W, H * 0.022);
    }

    // Crowd dots
    const crowdPalette = [
      'rgba(227,24,55,0.65)', 'rgba(227,24,55,0.45)',
      'rgba(0,32,91,0.65)',   'rgba(0,32,91,0.45)',
      'rgba(255,255,255,0.25)', 'rgba(255,220,0,0.4)',
    ];
    for (let i = 0; i < 500; i++) {
      const x = Math.random() * W;
      const y = H * 0.17 + Math.random() * H * 0.33;
      const clr = crowdPalette[Math.floor(Math.random() * crowdPalette.length)];
      const sz = 1.5 + Math.random() * 2.5;
      ctx.fillStyle = clr;
      ctx.fillRect(x - sz / 2, y - sz / 2, sz, sz);
    }

    // Flood lights (4 towers)
    const lights = [
      { x: W * 0.07, y: H * 0.19 },
      { x: W * 0.26, y: H * 0.11 },
      { x: W * 0.74, y: H * 0.11 },
      { x: W * 0.93, y: H * 0.19 },
    ];

    lights.forEach(l => {
      // Glow halo
      const halo = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, 110);
      halo.addColorStop(0, 'rgba(255,248,205,0.55)');
      halo.addColorStop(0.35, 'rgba(255,248,205,0.12)');
      halo.addColorStop(1, 'transparent');
      ctx.fillStyle = halo;
      ctx.fillRect(0, 0, W, H);

      // Light beam cone
      ctx.save();
      const beam = ctx.createLinearGradient(l.x, l.y, l.x, H * 0.68);
      beam.addColorStop(0, 'rgba(255,248,205,0.1)');
      beam.addColorStop(1, 'transparent');
      ctx.fillStyle = beam;
      ctx.beginPath();
      ctx.moveTo(l.x - 6, l.y);
      ctx.lineTo(l.x + 6, l.y);
      ctx.lineTo(l.x + W * 0.18, H * 0.68);
      ctx.lineTo(l.x - W * 0.18, H * 0.68);
      ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Bulb
      ctx.fillStyle = 'rgba(255,252,220,0.95)';
      ctx.beginPath();
      ctx.arc(l.x, l.y, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(l.x, l.y, 2.2, 0, Math.PI * 2);
      ctx.fill();
    });

    // Baseball field — green oval
    const fX = W * 0.5, fY = H * 0.82;
    const fRX = W * 0.38, fRY = H * 0.22;

    // Mowing stripes
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(fX, fY, fRX, fRY, 0, 0, Math.PI * 2);
    ctx.clip();
    const stripes = 14;
    for (let i = 0; i < stripes; i++) {
      const x = fX - fRX + i * (fRX * 2 / stripes);
      ctx.fillStyle = i % 2 === 0 ? '#1A5E28' : '#1F6D30';
      ctx.fillRect(x, fY - fRY, fRX * 2 / stripes, fRY * 2);
    }
    ctx.restore();

    // Field border glow
    ctx.strokeStyle = 'rgba(60,180,80,0.2)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(fX, fY, fRX, fRY, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Infield dirt
    const dirt = ctx.createRadialGradient(fX, fY - fRY * 0.08, 0, fX, fY - fRY * 0.08, fRX * 0.44);
    dirt.addColorStop(0, 'rgba(165,100,48,0.85)');
    dirt.addColorStop(0.65, 'rgba(145,85,38,0.65)');
    dirt.addColorStop(1, 'transparent');
    ctx.fillStyle = dirt;
    ctx.beginPath();
    ctx.ellipse(fX, fY - fRY * 0.08, fRX * 0.42, fRY * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();

    // Baseball diamond
    const dSz = Math.min(fRX, fRY) * 0.48;
    const dY = fY - fRY * 0.12;
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(fX,        dY - dSz);      // 2루
    ctx.lineTo(fX + dSz, dY);            // 1루
    ctx.lineTo(fX,        dY + dSz * 0.55); // 홈
    ctx.lineTo(fX - dSz, dY);            // 3루
    ctx.closePath();
    ctx.stroke();

    // Pitching mound
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.arc(fX, dY - dSz * 0.18, 5, 0, Math.PI * 2);
    ctx.fill();

    // "잠실야구장" label on field
    const labelSize = Math.max(11, W * 0.022);
    ctx.fillStyle = 'rgba(255,255,255,0.13)';
    ctx.font = `bold ${labelSize}px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('잠실야구장', fX, fY - fRY * 0.68);
  }

  draw();
  window.addEventListener('resize', draw);
</script>

</body>
</html>
